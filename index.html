<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Rankings</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.controls{
    text-align:center;
    margin-bottom:25px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    background:gold;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:linear-gradient(135deg,#d4af37,#f7e27d);
    color:black;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px rgba(255,215,0,.35);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.overall{
    font-size:60px;
    font-weight:bold;
}

.player-name{
    font-size:28px;
    font-weight:bold;
}

.stats{
    margin-top:10px;
}

.stat{
    display:flex;
    justify-content:space-between;
    margin:4px 0;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>🏓 Pickleball Player Rankings</h1>

<div class="controls">
    <button onclick="sortPlayers()">Sort by Overall</button>
</div>

<div class="cards" id="cards"></div>

<script>

const players = [
{
name:"Owen",
serve:87,
power:91,
dinking:92,
spiking:84,
placement:94,
defense:88,
Athleticism:96,
consistency:84
},
{
name:"Vito",
serve:95,
power:94,
dinking:84,
spiking:95,
placement:89,
defense:86,
Athleticism:91,
consistency:87
},
{
name:"Clark",
serve:87,
power:88,
dinking:92,
spiking:78,
placement:85,
defense:96,
Athleticism:91,
consistency:93
},
{
name:"Derek Z.",
serve:97,
power:88,
dinking:91,
spiking:76,
placement:89,
defense:88,
Athleticism:67,
consistency:84
},
{
name:"Noah",
serve:78,
power:79,
dinking:89,
spiking:82,
placement:67,
defense:92,
Athleticism:95,
consistency:97
},
{
name:"Jake",
serve:76,
power:89,
dinking:85,
spiking:97,
placement:83,
defense:78,
Athleticism:82,
consistency:89
},
{
name:"Andre",
serve:87,
power:78,
dinking:86,
spiking:74,
placement:70,
defense:85,
Athleticism:84,
consistency:72
},
{
name:"Derek S.",
serve:57,
power:58,
dinking:50,
spiking:50,
placement:52,
defense:50,
Athleticism:65,
consistency:83
},
{
name:"Brady",
serve:87,
power:90,
dinking:93,
spiking:95,
placement:96,
defense:95,
Athleticism:93,
consistency:94
}
];

function overall(player){
    const total =
        player.serve +
        player.power +
        player.dinking +
        player.spiking +
        player.placement +
        player.defense +
        player.Athleticism +
        player.consistency;

    return Math.round(total/8);
}

function renderPlayers(){

    const cards = document.getElementById("cards");

    cards.innerHTML="";

    players.forEach(player=>{

        cards.innerHTML += `
        <div class="card">
            <div class="top">
                <div class="overall">${overall(player)}</div>
                <div class="player-name">${player.name}</div>
            </div>

            <div class="stats">
                <div class="stat"><span>Serve</span><span>${player.serve}</span></div>
                <div class="stat"><span>Power</span><span>${player.power}</span></div>
                <div class="stat"><span>Dinking</span><span>${player.dinking}</span></div>
                <div class="stat"><span>Volleys</span><span>${player.volleys}</span></div>
                <div class="stat"><span>Placement</span><span>${player.placement}</span></div>
                <div class="stat"><span>Defense</span><span>${player.defense}</span></div>
                <div class="stat"><span>Speed</span><span>${player.speed}</span></div>
                <div class="stat"><span>Consistency</span><span>${player.consistency}</span></div>
            </div>
        </div>
        `;
    });
}

function sortPlayers(){
    players.sort((a,b)=>overall(b)-overall(a));
    renderPlayers();
}

sortPlayers();

</script>

</body>
</html>
