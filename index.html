<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Rankings</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.controls{
    text-align:center;
    margin-bottom:25px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    background:gold;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:linear-gradient(135deg,#d4af37,#f7e27d);
    color:black;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px rgba(255,215,0,.35);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.overall{
    font-size:60px;
    font-weight:bold;
}

.player-name{
    font-size:28px;
    font-weight:bold;
}

.stats{
    margin-top:10px;
}

.stat{
    display:flex;
    justify-content:space-between;
    margin:4px 0;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>🏓 Pickleball Player Rankings</h1>

<div class="controls">
    <button onclick="sortPlayers()">Sort by Overall</button>
</div>

<div class="cards" id="cards"></div>

<script>

const players = [
{
name:"Owen",
serve:88,
power:91,
dinking:87,
volleys:89,
placement:88,
defense:86,
speed:90,
consistency:87
},
{
name:"Vito",
serve:92,
power:95,
dinking:91,
volleys:94,
placement:90,
defense:89,
speed:92,
consistency:90
},
{
name:"Clark",
serve:80,
power:83,
dinking:82,
volleys:81,
placement:80,
defense:79,
speed:82,
consistency:84
},
{
name:"Derek Z.",
serve:86,
power:89,
dinking:84,
volleys:86,
placement:85,
defense:83,
speed:87,
consistency:85
},
{
name:"Noah",
serve:90,
power:88,
dinking:92,
volleys:91,
placement:90,
defense:89,
speed:88,
consistency:92
},
{
name:"Jake",
serve:84,
power:86,
dinking:85,
volleys:84,
placement:83,
defense:82,
speed:85,
consistency:86
},
{
name:"Andre",
serve:87,
power:90,
dinking:86,
volleys:88,
placement:87,
defense:85,
speed:89,
consistency:86
},
{
name:"Derek S.",
serve:82,
power:84,
dinking:83,
volleys:82,
placement:84,
defense:81,
speed:83,
consistency:85
},
{
name:"Brady",
serve:89,
power:87,
dinking:90,
volleys:88,
placement:89,
defense:90,
speed:87,
consistency:91
}
];

function overall(player){
    const total =
        player.serve +
        player.power +
        player.dinking +
        player.volleys +
        player.placement +
        player.defense +
        player.speed +
        player.consistency;

    return Math.round(total/8);
}

function renderPlayers(){

    const cards = document.getElementById("cards");

    cards.innerHTML="";

    players.forEach(player=>{

        cards.innerHTML += `
        <div class="card">
            <div class="top">
                <div class="overall">${overall(player)}</div>
                <div class="player-name">${player.name}</div>
            </div>

            <div class="stats">
                <div class="stat"><span>Serve</span><span>${player.serve}</span></div>
                <div class="stat"><span>Power</span><span>${player.power}</span></div>
                <div class="stat"><span>Dinking</span><span>${player.dinking}</span></div>
                <div class="stat"><span>Volleys</span><span>${player.volleys}</span></div>
                <div class="stat"><span>Placement</span><span>${player.placement}</span></div>
                <div class="stat"><span>Defense</span><span>${player.defense}</span></div>
                <div class="stat"><span>Speed</span><span>${player.speed}</span></div>
                <div class="stat"><span>Consistency</span><span>${player.consistency}</span></div>
            </div>
        </div>
        `;
    });
}

function sortPlayers(){
    players.sort((a,b)=>overall(b)-overall(a));
    renderPlayers();
}

sortPlayers();

</script>

</body>
</html>
